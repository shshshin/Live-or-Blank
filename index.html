<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ Live or Blank ]</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 class="neon-red">[ Live Or Blank ]</h1>
        <div class="neon-line"></div>
        <p class="author">made by 남경훈, 신윤후</p>
    </header>

    <section id="projects">
        <div class="project-card active">
            <span class="card-meta">MAIN ROOM:</span>
            <h3>THE ROULETTE</h3>
            <p>당신의 운을 시험하세요...<br>그리고 살아남으세요.</p>
            <a href="teamBuck/index.html" class="enter-btn">ENTER THE ROOM</a>
        </div>

        <div class="project-card active">
            <span class="card-meta">공지사항:</span>
            <h3>변경사항</h3>
            <p>변경사항을 직접 확인하세요!<br>그리고 </p>
            <a href="#" class="enter-btn">UNAVAILABLE</a>
        </div>
    </section>
    
    <audio id="bgm" loop>
        <source src="teamBuck/assets/main_bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
    function playBGM() {
        const bgm = document.getElementById('bgm');
        if (bgm.paused) {
            bgm.volume = 0.4;
            bgm.play().catch(error => {
                // 자동재생 차단 시, 첫 클릭으로 재생 시도
                console.warn("자동재생 차단됨. 클릭 시 재생됩니다.");
                window.addEventListener('click', () => {
                    bgm.play();
                }, { once: true });
            });
        }
    }

    document.addEventListener('DOMContentLoaded', playBGM);
</script>
</body>
</html>
